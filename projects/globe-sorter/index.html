<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Silhouette Sorter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .stats { margin-bottom: 10px; font-weight: bold; color: #4a5568; }
        #shapes-area { 
            display: flex; justify-content: center; gap: 30px; 
            margin-bottom: 40px; min-height: 160px; width: 100%; max-width: 800px;
            background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .country-card { width: 120px; text-align: center; cursor: grab; }
        .silhouette { width: 100px; height: 100px; filter: brightness(0); transition: filter 0.5s; pointer-events: none; }
        
        .drop-zones { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
            width: 100%; max-width: 900px; 
        }
        .zone { 
            border: 2px solid #cbd5e0; border-radius: 12px; padding: 15px; 
            min-height: 100px; background: #fff; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .zone.drag-over { border-color: #4299e1; background: #ebf8ff; }
        .correct-item { width: 40px !important; height: 40px !important; filter: none !important; margin: 2px; }
        #message { margin-top: 20px; font-size: 1.2rem; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

        let availableCountries = [...masterList];
        const continents = ["Africa", "Asia", "Europe", "North America", "South America", "Oceania"];

        function init() {
            const zonesContainer = document.getElementById('drop-zones');
            continents.forEach(c => {
                const z = document.createElement('div');
                z.className = 'zone';
                z.innerHTML = `<strong>${c}</strong>`;
                z.dataset.continent = c;
                z.ondragover = e => { e.preventDefault(); z.classList.add('drag-over'); };
                z.ondragleave = () => z.classList.remove('drag-over');
                z.ondrop = handleDrop;
                zonesContainer.appendChild(z);
            });
            spawnBatch();
        }

        function spawnBatch() {
            const area = document.getElementById('shapes-area');
            area.innerHTML = '';
            document.getElementById('counter').innerText = `Remaining Countries: ${availableCountries.length}`;

            if (availableCountries.length === 0) {
                document.getElementById('message').innerText = "🏆 You sorted the whole world!";
                return;
            }

            // Shuffle and pick top 3
            availableCountries.sort(() => 0.5 - Math.random());
            const batch = availableCountries.slice(0, 3);

            batch.forEach(country => {
                const card = document.createElement('div');
                card.className = 'country-card';
                card.draggable = true;
                card.id = country.name;
                card.dataset.continent = country.continent;
                card.innerHTML = `<img src="${country.img}" class="silhouette">`;
                card.ondragstart = e => e.dataTransfer.setData("text", e.target.id);
                area.appendChild(card);
            });
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            const name = e.dataTransfer.getData("text");
            const el = document.getElementById(name);
            const msg = document.getElementById('message');

            if (el.dataset.continent === this.dataset.continent) {
                // Remove from the master available list so it never repeats
                availableCountries = availableCountries.filter(c => c.name !== name);
                
                // Add mini version to the box
                const mini = el.querySelector('img');
                mini.className = 'correct-item';
                this.appendChild(mini);
                el.remove();
                
                msg.innerText = `Correct! That's ${name}.`;
                msg.style.color = "green";
                
                if (document.getElementById('shapes-area').children.length === 0) {
                    setTimeout(spawnBatch, 1000);
                }
            } else {
                msg.innerText = "Try again! That's not the right continent.";
                msg.style.color = "red";
                // Reset position happens automatically as it's not appended to the zone
            }
        }

        init();
    </script>
